<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Personal Productivity Dashboard</title>
  <link rel="stylesheet" href="/styles.css" />
  <script>
    (function () {
      try {
        var t = localStorage.getItem("dashboard.theme");
        if (t === "dark" || t === "light") document.documentElement.setAttribute("data-theme", t);
      } catch (_) {}
    })();
  </script>
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      padding: 40px 36px;
      text-align: center;
    }
    .login-card h1 {
      margin-bottom: 8px;
    }
    .login-card .eyebrow {
      margin-bottom: 16px;
    }
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-top: 28px;
      text-align: left;
    }
    .login-form label {
      font-weight: 600;
      color: var(--text);
      font-size: 0.9rem;
    }
    .login-form input[type="email"] {
      width: 100%;
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 12px;
      padding: 14px 16px;
      font: inherit;
      font-size: 1rem;
      margin-top: 6px;
    }
    .login-form input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(14, 165, 162, 0.2);
    }
    .login-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 8px;
    }
    .login-btn {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px 20px;
      font: inherit;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.05s ease, box-shadow 0.2s ease;
    }
    .login-btn:focus {
      outline: none;
    }
    .login-btn:active {
      transform: scale(0.99);
    }
    .login-btn-employee {
      background: linear-gradient(135deg, #14b8a6 0%, #0ea5a2 100%);
      color: #f8fffe;
      box-shadow: 0 4px 14px rgba(14, 165, 162, 0.35);
    }
    .login-btn-employee:hover {
      box-shadow: 0 6px 20px rgba(14, 165, 162, 0.4);
    }
    .login-btn-manager {
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      color: #fff;
      box-shadow: 0 4px 14px rgba(245, 158, 11, 0.35);
    }
    .login-btn-manager:hover {
      box-shadow: 0 6px 20px rgba(245, 158, 11, 0.4);
    }
    .login-message {
      margin-top: 12px;
      min-height: 20px;
      font-size: 0.9rem;
      color: var(--muted);
    }
    .login-message.error {
      color: var(--danger);
    }
    .login-message.success {
      color: var(--success);
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="card login-card">
      <p class="eyebrow">My Workspace</p>
      <h1>Sign in</h1>
      <p class="sub" style="margin: 0;">Enter your work email. Your role (Engineer or Manager) is set from your job title.</p>

      <form class="login-form" id="loginForm" novalidate>
        <label for="loginEmail">Work email</label>
        <input
          id="loginEmail"
          type="email"
          placeholder="you@nokia.com"
          autocomplete="email"
          required
        />

        <div class="login-actions">
          <button type="submit" class="login-btn login-btn-employee" id="signInBtn">
            Sign in
          </button>
        </div>
      </form>

      <p class="login-message" id="loginMessage" aria-live="polite"></p>
    </div>
  </div>

  <script src="/login.js"></script>
</body>
</html>
